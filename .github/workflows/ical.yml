name: Generate iCal Feed

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # allow manual trigger from GitHub UI

permissions:
  contents: write             # needed to commit deadlines.ics back to the repo

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Generate deadlines.ics
        env:
          NLEARN_URL: ${{ secrets.NLEARN_URL }}
          NLEARN_USERNAME: ${{ secrets.NLEARN_USERNAME }}
          NLEARN_PASSWORD: ${{ secrets.NLEARN_PASSWORD }}
        run: python generate_ical.py --days 30 --output deadlines.ics

      - name: Commit and push deadlines.ics
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deadlines.ics
          # Only commit if the file actually changed
          git diff --cached --quiet || git commit -m "chore: update deadlines.ics [skip ci]"
          git push
